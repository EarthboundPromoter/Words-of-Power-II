target-version = "py38"
line-length = 120

[lint]
# Default rules (E, F) plus a few useful extras
select = ["E", "F", "W"]
ignore = [
    "E402",  # Module-level import not at top — intentional, game path setup must precede game imports
    "E701",  # Multiple statements on one line — style choice, used for compact guard clauses
    "E741",  # Ambiguous variable name (l, I, O) — too aggressive for loop vars
]

[format]
quote-style = "double"
indent-style = "space"
