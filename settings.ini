[words_of_power]
show_coordinates = true
keybinds_migrated = true
journal_log_enabled = true


# Announce pathfinding for the marked target. On marking, speaks the full
# compressed path. Each subsequent turn, prepends the next single step
# ("Move north.") to the regular mark readout. Set false to silence the
# navigation channel without losing the rest of the mark info.
# Default: true
pathfind_marked = true

# Enable the direct-action digest: a composed summary of one player
# keypress's full effect chain (cast, damage, kills, procs, side-effects)
# emitted at turn-end as a single utterance, replacing the per-event
# combat speech that would otherwise come from the batcher for that
# chain. Crisis events (player damage taken, HP threshold, wizard
# death) continue to fire immediately regardless of this setting.
# Default: false (opt-in; first-release rollout)
digest_enabled = true

[Composer]

# Enable the crisis producer: foregrounds player-state-change events
# (damage taken, HP threshold, debuffs applied, buffs fading, wizard
# death, cloud-on-tile, displacement) at the top of each turn's
# utterance via the Wizard-prefix convention. Replaces the legacy
# batcher's IMMEDIATE-tier handling of these events when also
# legacy_batcher_combat_enabled=false.
# Default: false (opt-in; parallel-mode validation phase)
crisis_enabled = true

# Enable the orphan-window composer: composes the ambient/enemy-turn
# body of each turn's utterance — equipment passives, non-player
# actions (enemy + ally casts, attacks, deaths), status ticks (DOTs,
# fades, unfreeze). Replaces the legacy batcher's collapsed-tier
# combat handling when also legacy_batcher_combat_enabled=false.
# Default: false (opt-in; parallel-mode validation phase)
orphan_enabled = true

# Strangler-fig kill switch. When true (default), the legacy batcher's
# combat handlers continue to render damage / casts / deaths / heals /
# buffs / shields / spawns alongside the digest. When false, those
# handlers bail at a shared check at top, leaving combat narration
# entirely to the new pipeline (digest + crisis + orphan). Flip to
# false only after crisis_enabled and orphan_enabled have been
# validated in parallel-mode play.
# Default: true
legacy_batcher_combat_enabled = true

# Renotify the player each turn while a damage-over-time effect is
# active on the wizard (Poisoned, Burning, Bleeding, etc.). When
# false (default), the apply-time announcement is the only crisis
# line for the DOT — the player can query active effects for
# remaining duration. When true, every tick fires a crisis line
# ("Wizard took 1 Poison from Poisoned") alongside other damage.
# Reserved for users who want continuous DOT awareness during
# multi-DOT pile-ons.
# Default: false
dot_renotify_enabled = false

# Verbose rendering for enemy movement abilities (Frog Hop, Dash,
# Blink-style spells). When false (default), movement chains
# render compactly: 'Horned Toad cast Frog Hop, moved to (22,22).'
# for a single mover, '5 Horned Toads cast Frog Hop, moved.' for
# multi-collapse. When true, movement chains include each caster's
# starting position and the full from-to pair list:
# '5 Horned Toads cast Frog Hop: (21,23) to (22,22), (17,10) to
# (20,9), ...' Useful when tracking exact enemy positions matters.
# Default: false (noise reduction; flip true for full spatial
# detail).
movement_verbose = false


# Enable the equipment producer: composes gear-driven narrative
# (equipment_tick chains — sub-cast items like Explosive Spore
# Manual, direct-effect items like Stone Mask) at priority 150,
# between digest (player keypress) and orphan (ambient). Independent
# from orphan_enabled because gear narrative and ambient enemy
# narrative evolve on different timelines. Replaces legacy batcher
# coverage of equipment effects when also
# legacy_batcher_combat_enabled=false.
# Default: false (opt-in; parallel-mode validation phase)
equipment_enabled = false

