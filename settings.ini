[words_of_power]
show_coordinates = true
keybinds_migrated = true
journal_log_enabled = true


# Announce pathfinding for the marked target. On marking, speaks the full
# compressed path. Each subsequent turn, prepends the next single step
# ("Move north.") to the regular mark readout. Set false to silence the
# navigation channel without losing the rest of the mark info.
# Default: true
pathfind_marked = true

# Enable the direct-action digest: a composed summary of one player
# keypress's full effect chain (cast, damage, kills, procs, side-effects)
# emitted at turn-end as a single utterance, replacing the per-event
# combat speech that would otherwise come from the batcher for that
# chain. Crisis events (player damage taken, HP threshold, wizard
# death) continue to fire immediately regardless of this setting.
# Default: false (opt-in; first-release rollout)
digest_enabled = true

# Capture the game's combat-log writes as internal validation records
# (coverage checking only — never spoken). Safe to leave on; set false
# as a field kill switch if instructed to diagnose a problem.
# Default: true
log_capture_enabled = true

# Capture in-place stat-container changes (resistances, tags, spell
# charges, stat bonuses) as internal records for future narration —
# nothing is spoken yet. Safe to leave on; set false as a field kill
# switch if instructed to diagnose a problem.
# Default: true
container_diff_enabled = true

# Record cause-markers around component pickups, equipment-triggered
# component replays, and equipment crafting, so their effects carry
# their true cause internally — nothing is spoken yet. Safe to leave
# on; set false as a field kill switch if instructed to diagnose a
# problem.
# Default: true
cause_markers_enabled = true

[Composer]

# Enable the crisis producer: foregrounds player-state-change events
# (damage taken, HP threshold, debuffs applied, buffs fading, wizard
# death, cloud-on-tile, displacement) at the top of each turn's
# utterance via the Wizard-prefix convention. Replaces the legacy
# batcher's IMMEDIATE-tier handling of these events when also
# legacy_batcher_combat_enabled=false.
# Default: false (opt-in; parallel-mode validation phase)
crisis_enabled = true

# Enable the orphan-window composer: composes the ambient/enemy-turn
# body of each turn's utterance — equipment passives, non-player
# actions (enemy + ally casts, attacks, deaths), status ticks (DOTs,
# fades, unfreeze). Replaces the legacy batcher's collapsed-tier
# combat handling when also legacy_batcher_combat_enabled=false.
# Default: false (opt-in; parallel-mode validation phase)
orphan_enabled = true

# Strangler-fig kill switch (combat-only). When true, the legacy batcher
# narrates all combat (damage / casts / deaths / heals / buffs / shields /
# spawns) alongside the pipeline — which doubles the lines the pipeline now
# composes. When false, the batcher branches the pipeline REPLACES are
# silenced (wizard + ambient damage, casts, wizard heals/buffs/shield),
# leaving the rest to crisis/digest/orphan. Branches no producer covers yet
# stay on the batcher so nothing goes silent: ambient non-player deaths,
# spawns, ambient (non-wizard) heals/shields, plus the always-kept
# non-combat lines (charge warnings, item pickups, cooldown-ready, buff-fade
# warnings, soul jar, enters-LoS, HP readout).
# Default: true (set false to hear the pipeline without the doubling).
legacy_batcher_combat_enabled = false

# Renotify the player each turn while a damage-over-time effect is
# active on the wizard (Poisoned, Burning, Bleeding, etc.). When
# false (default), the apply-time announcement is the only crisis
# line for the DOT — the player can query active effects for
# remaining duration. When true, every tick fires a crisis line
# ("Wizard took 1 Poison from Poisoned") alongside other damage.
# Reserved for users who want continuous DOT awareness during
# multi-DOT pile-ons.
# Default: false
dot_renotify_enabled = false

# Verbose rendering for enemy movement abilities (Frog Hop, Dash,
# Blink-style spells). When false (default), movement chains
# render compactly: 'Horned Toad cast Frog Hop, moved to (22,22).'
# for a single mover, '5 Horned Toads cast Frog Hop, moved.' for
# multi-collapse. When true, movement chains include each caster's
# starting position and the full from-to pair list:
# '5 Horned Toads cast Frog Hop: (21,23) to (22,22), (17,10) to
# (20,9), ...' Useful when tracking exact enemy positions matters.
# Default: false (noise reduction; flip true for full spatial
# detail).
movement_verbose = false


# Enable the equipment producer: composes gear-driven narrative
# (equipment_tick chains — sub-cast items like Explosive Spore
# Manual, direct-effect items like Stone Mask) at priority 150,
# between digest (player keypress) and orphan (ambient). Independent
# from orphan_enabled because gear narrative and ambient enemy
# narrative evolve on different timelines. Replaces legacy batcher
# coverage of equipment effects when also
# legacy_batcher_combat_enabled=false.
# Default: false (opt-in; parallel-mode validation phase)
equipment_enabled = true


# How repeated identical hits on the wizard in one turn are read.
# When false (default), the per-hit value is kept with a multiplier:
# 'Wizard took 3 Physical from Raven's Peck, 3 times.' When true, the
# total is reported instead: 'Wizard took 9 Physical from Raven's
# Peck.' Hits of differing magnitude are never merged either way (the
# variance is resist/vulnerability information).
# Default: false
crisis_damage_summed = false


# How many spawned units a wave lists by exact position before it
# switches to a directional summary. At or below the cap, the orphan
# composer speaks each tile ('3 Ash Imps spawned at (4,4), (5,3),
# (4,5).'); above it, a top-two-direction summary ('7 Bats spawned, 5
# north, 2 southeast.' or '... scattered.'). Set 0 to always summarize,
# a high number to always list tiles.
# Default: 5
spawn_coord_cap = 5

# Where the 'Out of sight.' transition is spoken in the ambient body.
# In-sight enemy/ally/status lines always lead (nearest first); out-of-
# sight lines trail. 'section' (default) speaks one 'Out of sight.' gate
# between the two halves (fewest words). 'block' repeats it before each
# of the enemy / ally / status groups. 'line' tags each out-of-sight
# line individually.
# Default: section
orphan_los_grouping = section


# Speak an enemy's resulting shield count when its shields change out of
# combat with you (an enemy self-shields, an aura strips it, your
# attack is blocked): 'Ogre gained 2 shields, 5 total.' / 'Ogre blocked
# 12 Fire from Fire Bolt, 2 shields left.' Knowing how many shields stand
# between you and an enemy is how-many-hits-to-break information a sighted
# player reads off the shield pips.
# Default: true
enemy_shield_totals = true

# The same resulting-count tail for ALLY units (summons, charmed foes).
# Off by default — useful if you micro your allies' defensive buffer,
# noise if you don't. Independent of enemy_shield_totals.
# Default: false
ally_shield_totals = false
